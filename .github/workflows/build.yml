name: Build Electron App
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npx electron-builder --win

      - uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/*.exe
