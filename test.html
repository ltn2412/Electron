<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 0;
        color: #000;
        width: 300px; /* Khớp chính xác khổ giấy 80mm trên Windows */
        box-sizing: border-box;
        font-weight: 900 !important; /* Đảm bảo chữ in nhiệt cực kỳ đậm */
      }
      .row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .label {
        color: #333;
        font-size: 12px;
        padding-right: 5px;
        flex: 0 0 110px; /* Cố định cột bên trái để cột phải không bị đẩy tràn viền */
      }
      .value {
        text-align: right;
        font-size: 14px;
        word-break: break-word;
        flex: 1;
      }
      .value-blue {
        color: #000;
      }
      .divider {
        border-top: 1px dashed #000;
        margin: 12px 0;
      }
      .force-feed {
        margin-top: 20px;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="label">Mã đơn hàng / Order No:</div>
      <div class="value">ORDER2607100005_1DC8</div>
    </div>
    <div class="row">
      <div class="label">Khách hàng / Customer:</div>
      <div class="value">Duy Vũ @ Speed</div>
    </div>
    <div class="row">
      <div class="label">Email:</div>
      <div class="value">ba4@speedup.vn</div>
    </div>
    <div class="row">
      <div class="label">Ngày tham quan / Visit Date:</div>
      <div class="value value-blue">10/07/2026</div>
    </div>
    <div class="row">
      <div class="label">Ngày mua / Purchase Date:</div>
      <div class="value">10/07/2026 10:48:23</div>
    </div>
    <div class="divider"></div>
    <div class="force-feed">.</div>
  </body>
</html>
