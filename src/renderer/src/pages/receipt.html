<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 0; }
  body { 
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
    margin: 0; 
    padding: 0 10px 0 10px; /* Bỏ khoảng trắng ở trên */
    color: #000;
    width: 100%;
    box-sizing: border-box;
    font-weight: 900 !important; /* Ép in đậm toàn bộ để nét chữ cực kỳ rõ */
  }
  .row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 25px;
  }
  .label {
    color: #333;
    font-size: 28px;
    padding-right: 15px;
  }
  .value {
    text-align: right;
    font-size: 32px;
    word-break: break-word;
  }
  .value-blue {
    color: #0044cc;
  }
  .divider {
    border-top: 3px dashed #000;
    margin: 30px 0;
  }
  .force-feed {
    margin-top: 60px;
    visibility: hidden; /* Dòng chữ ẩn để lừa máy in xả giấy xuống */
  }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Mã đơn hàng / Order No:</div>
    <div class="value">ORDER2607100005_1DC8</div>
  </div>
  <div class="row">
    <div class="label">Khách hàng / Customer:</div>
    <div class="value">Duy Vũ @ Speed</div>
  </div>
  <div class="row">
    <div class="label">Email:</div>
    <div class="value">ba4@speedup.vn</div>
  </div>
  <div class="row">
    <div class="label">Ngày tham quan / Visit Date:</div>
    <div class="value value-blue">10/07/2026</div>
  </div>
  <div class="row">
    <div class="label">Ngày mua / Purchase Date:</div>
    <div class="value">10/07/2026 10:48:23</div>
  </div>
  <div class="divider"></div>
  <div class="force-feed">.</div>
</body>
</html>
